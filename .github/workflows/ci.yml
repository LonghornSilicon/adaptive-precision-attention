name: CI (main — docs / analysis / reference / paper)

on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
      - 'memory/**'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    uses: LonghornSilicon/.github/.github/workflows/block-ci.yml@main
    with:
      block-name: precision_controller
      expected-ff-count: 30         # required input; unused when has-rtl:false
      has-rtl: false                # RTL lives on the 'rtl' branch
      has-reference-model: false    # golden-vector parity runs on the rtl branch
      has-paper: true               # the ACU paper builds on main
